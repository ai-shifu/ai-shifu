# Nginx for AI-Shifu-TTS
# Linux:  cp this file to /etc/nginx/conf.d/ai-shifu.conf
# Mac (Homebrew): cp this file to /opt/homebrew/etc/nginx/servers/ai-shifu.conf

upstream api_backend {
    server 127.0.0.1:5800;
    keepalive 32;
}

upstream frontend_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _ benben.local;

    # Large file upload support
    client_max_body_size 3000m;

    # Logging
    access_log /var/log/nginx/ai-shifu-access.log;
    error_log  /var/log/nginx/ai-shifu-error.log warn;

    # --------------------------------------------------
    # Next.js static assets → 直接从磁盘读取，不需要过 Node
    # 部署时修改 /home/ai-shifu-TTS 为你的实际路径
    # --------------------------------------------------
    location /_next/static/ {
        alias /home/ai-shifu-TTS/src/cook-web/.next/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --------------------------------------------------
    # Cook Web i18n/config API → Next.js frontend
    # --------------------------------------------------
    location /api/i18n {
        proxy_pass http://frontend_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/config {
        proxy_pass http://frontend_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------
    # Backend API → Flask (Gunicorn)
    # --------------------------------------------------
    location /api/ {
        proxy_pass http://api_backend/api;
        proxy_http_version 1.1;

        # Streaming / SSE support
        proxy_buffering     off;
        proxy_send_timeout  3600s;
        proxy_read_timeout  3600s;
        proxy_connect_timeout 3600s;

        # File upload
        client_max_body_size 3000m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --------------------------------------------------
    # Frontend (Next.js) → 代理到 standalone server
    # --------------------------------------------------
    location / {
        proxy_pass http://frontend_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
