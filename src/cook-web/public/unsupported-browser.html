<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Update Required</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f7fb;
        color: #1f2937;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue',
          Arial, sans-serif;
      }
      .card {
        width: min(92vw, 520px);
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 24px 20px;
        box-shadow: 0 10px 30px rgba(15, 99, 238, 0.08);
      }
      .title {
        margin: 0 0 12px;
        font-size: 20px;
        line-height: 1.4;
        color: #0f63ee;
      }
      .desc {
        margin: 0;
        font-size: 14px;
        line-height: 1.8;
      }
      .desc + .desc {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 class="title">当前 iOS 版本暂不支持</h1>
      <p class="desc">
        为保证稳定体验，请将系统升级到 <strong>iOS 16.4</strong> 或更高版本后再访问。
      </p>
      <p class="desc">
        Your current iOS version is not supported. Please upgrade to
        <strong>iOS 16.4+</strong> and try again.
      </p>
    </main>
  </body>
</html>
